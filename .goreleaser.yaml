version: 2

before:
  hooks:
    - go mod tidy

builds:
  - main: .
    binary: dbtui
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/alaa/dbtui/cmd.version={{.Version}}
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - format: tar.gz
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    format_overrides:
      - goos: windows
        format: zip

nfpms:
  - package_name: dbtui
    vendor: alaa
    homepage: https://github.com/alaa/dbtui
    maintainer: alaa
    description: A modern terminal-based MySQL/MariaDB client
    license: MIT
    formats:
      - deb
      - rpm
      - apk
    bindir: /usr/bin

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"

release:
  github:
    owner: alaa
    name: dbtui
  draft: false
  prerelease: auto
  name_template: "v{{.Version}}"
